name: Kaypoh News

on:
  schedule:
    # Times are in UTC. Singapore is UTC+8.
    # 00:00 UTC = 8am SGT (morning), 10:00 UTC = 6pm SGT (evening).
    - cron: "0 0 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:   # lets you run it manually from the Actions tab

# Allow the workflow to commit the updated seen.json back to the repo.
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python news_bot.py

      - name: Save what we've posted
        run: |
          git config user.name "kaypoh-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json || true
          git commit -m "Update seen articles" || echo "Nothing to commit"
          git push || echo "Nothing to push"
